# ============================================================
# Loki Stack (Loki + Promtail) - Custom Values Override
# Chart: grafana/loki-stack
# Namespace: logging
# ============================================================

# ----------------------------------------------------------
# Loki (로그 저장/인덱싱)
# ----------------------------------------------------------
loki:
  enabled: true

  # 영구 스토리지
  persistence:
    enabled: true
    size: 25Gi
    storageClassName: rook-cephfs

  # Loki 설정
  config:
    # 인증 비활성화 (내부 클러스터 전용)
    auth_enabled: false

    # Ingester 설정
    ingester:
      chunk_idle_period: 30m
      max_transfer_retries: 0
      lifecycler:
        ring:
          replication_factor: 1

    # 저장소 설정 (파일시스템 기반)
    schema_config:
      configs:
        - from: "2024-01-01"
          store: boltdb-shipper
          object_store: filesystem
          schema: v11
          index:
            prefix: index_
            period: 24h

    storage_config:
      boltdb_shipper:
        active_index_directory: /data/loki/boltdb-shipper-active
        cache_location: /data/loki/boltdb-shipper-cache
        shared_store: filesystem
      filesystem:
        directory: /data/loki/chunks

    # [REQ-N-02] 로그 보존: 30일
    table_manager:
      retention_deletes_enabled: true
      retention_period: 720h

    # 입수 제한 설정
    limits_config:
      ingestion_rate_mb: 10
      ingestion_burst_size_mb: 20
      max_streams_per_user: 10000
      reject_old_samples: true
      reject_old_samples_max_age: 168h    # 7일 이상 지난 로그 거부

    # Compactor (BoltDB 인덱스 압축)
    compactor:
      working_directory: /data/loki/compactor
      shared_store: filesystem
      retention_enabled: true

  # [REQ-N-01] 자원 제한
  resources:
    limits:
      cpu: "1"
      memory: 2Gi
    requests:
      cpu: 250m
      memory: 512Mi

# ----------------------------------------------------------
# Promtail (로그 수집 에이전트 - DaemonSet)
# ----------------------------------------------------------
promtail:
  enabled: true

  config:
    # Loki Push 엔드포인트
    clients:
      - url: http://loki.logging.svc.cluster.local:3100/loki/api/v1/push

    snippets:
      # 파이프라인: Docker 컨테이너 로그 파싱
      pipelineStages:
        - docker: {}
        # 불필요한 라벨 제거 (카디널리티 관리)
        - labeldrop:
            - filename
            - stream

  # [REQ-N-01] 자원 제한
  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 50m
      memory: 64Mi

# ----------------------------------------------------------
# Grafana (loki-stack 내장 Grafana는 비활성화)
# → kube-prometheus-stack의 Grafana를 공유 사용
# ----------------------------------------------------------
grafana:
  enabled: false

# ----------------------------------------------------------
# Prometheus (loki-stack 내장 Prometheus는 비활성화)
# → kube-prometheus-stack의 Prometheus를 공유 사용
# ----------------------------------------------------------
prometheus:
  enabled: false
