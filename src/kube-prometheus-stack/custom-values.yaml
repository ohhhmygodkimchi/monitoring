# ============================================================
# kube-prometheus-stack - Custom Values Override
# Chart: prometheus-community/kube-prometheus-stack
# Namespace: monitoring
# ============================================================
# 이 파일은 default-values.yaml에서 변경이 필요한 항목만 기재합니다.
# [REQ-XX] 태그는 REQUIREMENTS.md의 요구사항 ID를 참조합니다.
# ============================================================

# ----------------------------------------------------------
# Prometheus
# ----------------------------------------------------------
prometheus:
  prometheusSpec:
    # [REQ-N-02] 메트릭 보존 기간: 15일
    retention: 15d

    # 영구 스토리지 설정
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 50Gi

    # [REQ-N-01] 자원 제한 설정
    resources:
      limits:
        cpu: "2"
        memory: 4Gi
      requests:
        cpu: 500m
        memory: 2Gi

    # Otel Collector로부터 Remote Write 수신 허용
    enableRemoteWriteReceiver: true

# ----------------------------------------------------------
# Alertmanager
# ----------------------------------------------------------
alertmanager:
  alertmanagerSpec:
    # 영구 스토리지
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 5Gi

    # [REQ-N-01] 자원 제한
    resources:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 128Mi

  # [REQ-F-04] Slack 알림 설정
  config:
    global:
      resolve_timeout: 5m
    route:
      group_by: ['alertname', 'namespace']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      receiver: 'slack-notifications'
      routes:
        - match:
            severity: critical
          receiver: 'slack-notifications'
          repeat_interval: 1h
    receivers:
      - name: 'slack-notifications'
        slack_configs:
          - api_url_file: /etc/alertmanager/secrets/alertmanager-slack-secret/webhook-url
            channel: '#alerts'
            send_resolved: true
            title: '[{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}'
            text: >-
              *Namespace:* {{ .CommonLabels.namespace }}
              *Pod:* {{ .CommonLabels.pod }}
              *Description:* {{ .CommonAnnotations.description }}

# ----------------------------------------------------------
# Grafana
# ----------------------------------------------------------
grafana:
  # [REQ-N-05] 인증 - Secret에서 admin password 주입
  admin:
    existingSecret: grafana-admin-secret
    userKey: admin-user
    passwordKey: admin-password

  # 영구 스토리지 (대시보드/플러그인 저장)
  persistence:
    enabled: true
    size: 5Gi
    storageClassName: local-path

  # NodePort로 외부 접근 허용
  service:
    type: NodePort
    nodePort: 30080

  # [REQ-F-13] Loki Data Source 자동 등록
  additionalDataSources:
    - name: Loki
      type: loki
      url: http://loki.logging.svc.cluster.local:3100
      access: proxy
      isDefault: false
    - name: Jaeger
      type: jaeger
      url: http://jaeger-query.tracing.svc.cluster.local:16686
      access: proxy
      isDefault: false

  # [REQ-N-01] 자원 제한
  resources:
    limits:
      cpu: "1"
      memory: 1Gi
    requests:
      cpu: 250m
      memory: 256Mi

# ----------------------------------------------------------
# Node Exporter (DaemonSet)
# ----------------------------------------------------------
nodeExporter:
  enabled: true
  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 50m
      memory: 64Mi

# ----------------------------------------------------------
# Kube-State-Metrics
# ----------------------------------------------------------
kubeStateMetrics:
  enabled: true

kube-state-metrics:
  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 50m
      memory: 64Mi

# ----------------------------------------------------------
# 기본 AlertRule 활성화 (K8s 클러스터 표준 규칙)
# ----------------------------------------------------------
defaultRules:
  create: true
  rules:
    alertmanager: true
    etcd: true
    general: true
    k8s: true
    kubeApiserver: true
    kubeApiserverAvailability: true
    kubePrometheusNodeRecording: true
    kubernetesApps: true
    kubernetesResources: true
    kubernetesStorage: true
    kubernetesSystem: true
    kubeScheduler: true
    node: true
    nodeExporterAlerting: true
    prometheus: true

# ----------------------------------------------------------
# [REQ-F-04] 추가 커스텀 Alert Rules
# ----------------------------------------------------------
additionalPrometheusRulesMap:
  custom-alerts:
    groups:
      - name: custom.node.rules
        rules:
          # 노드 CPU 80% 이상 5분 지속 시 경고
          - alert: NodeHighCpuUsage
            expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Node {{ $labels.instance }} CPU usage is above 80%"
              description: "CPU usage has been above 80% for 5 minutes (current: {{ $value }}%)"

          # 노드 메모리 85% 이상 사용 시 경고
          - alert: NodeHighMemoryUsage
            expr: (1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) * 100 > 85
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Node {{ $labels.instance }} memory usage is above 85%"
              description: "Memory usage has been above 85% for 5 minutes (current: {{ $value }}%)"

      - name: custom.pod.rules
        rules:
          # Pod CrashLoopBackOff 감지
          - alert: PodCrashLooping
            expr: rate(kube_pod_container_status_restarts_total[15m]) * 60 * 15 > 0
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} is crash looping"
              description: "Pod has restarted {{ $value }} times in the last 15 minutes"
